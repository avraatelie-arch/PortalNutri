version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: portalnutri-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portalnutri
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portalnutri-network

volumes:
  postgres_data:
    driver: local

networks:
  portalnutri-network:
    driver: bridge
